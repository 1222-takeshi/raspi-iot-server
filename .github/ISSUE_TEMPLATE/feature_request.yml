name: Feature Request
description: 新機能の提案
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜこの機能が必要か
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 何を実装したいか
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: どうなれば完了と言えるか（チェックリスト形式推奨）
    validations:
      required: true
